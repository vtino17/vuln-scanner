scanner:
  rate: 100
  timeout: 5
  retries: 2
  concurrency: 50

targets:
  - subnet: 10.0.0.0/24
    ports: [22, 80, 443, 3389, 8080]
  - subnet: 192.168.1.0/24
    ports: [443, 8443]

cve:
  enabled: true
  min_severity: medium
  nvd_api_key: ""

reporting:
  format: json
  output_dir: ./reports

notifications:
  slack:
    enabled: false
    webhook_url: ""
  email:
    enabled: false
    smtp_server: ""
    smtp_port: 587
    from_addr: ""
    to_addr: ""
